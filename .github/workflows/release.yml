name: Release numa-dev

on:
  push:
    tags:
      - "**"

permissions:
  contents: write

env:
  CARGO_TERM_COLOR: always

jobs:
  release:
    name: Build and publish numa-dev.exe
    runs-on: windows-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install stable Rust
        shell: pwsh
        run: |
          rustup toolchain install stable --profile minimal
          rustup default stable

      - name: Restore Cargo cache
        uses: actions/cache@v4
        with:
          path: |
            ~/.cargo/registry
            ~/.cargo/git
          key: ${{ runner.os }}-cargo-${{ hashFiles('Cargo.lock', 'Cargo.toml') }}
          restore-keys: |
            ${{ runner.os }}-cargo-

      - name: Verify bundled UPX
        shell: pwsh
        run: .\upx-5.1.0-win64\upx.exe --version

      - name: Test numa-dev
        shell: pwsh
        run: cargo test --locked --bin numa-dev

      - name: Build numa-dev
        shell: pwsh
        run: cargo build --release --locked --bin numa-dev

      - name: Prepare executable
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force dist | Out-Null
          Copy-Item target/release/numa-dev.exe dist/numa-dev.exe -Force
          .\upx-5.1.0-win64\upx.exe --best dist/numa-dev.exe
          .\dist\numa-dev.exe --help

      - name: Publish GitHub release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $tag = "${{ github.ref_name }}"
          $asset = "dist/numa-dev.exe"

          gh release view $tag *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release view $tag --json assets --jq '.assets[].name' |
              ForEach-Object { gh release delete-asset $tag $_ --yes }
            gh release upload $tag $asset
          } else {
            gh release create $tag $asset --title $tag --notes "Automated release for $tag."
          }
